<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Corte de Caja - ZONAZERO</title>
    <link rel="stylesheet" href="pos-style.css">
    <link rel="manifest" href="manifest.json">
    <style>
        /* Estilos específicos para el historial que puedes pasar a tu CSS general si prefieres */
        .panel-historial { max-width: 600px; margin: 20px auto; padding: 20px; background: #fff; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex;
            flex-direction: column;
            max-height: 80vh;}
        .resumen-corte { display: flex; justify-content: space-between; background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #eee; }
        .resumen-item { text-align: center; width: 48%; }
        .resumen-valor { font-size: 2em; font-weight: bold; color: #28a745; margin-top: 5px; }
        .item-transaccion { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .item-transaccion:last-child { border-bottom: none; }
        .monto-transaccion { font-size: 1.2em; font-weight: bold; color: #333; }
        .btn-peligro { background-color: #dc3545; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1.1em; margin-top: 20px; flex-shrink: 0;}
    </style>
</head>
<body>
    <header class="app-header">
        <div>
            <h1>Historial y Corte de Caja</h1>
            <p class="subtitle">Detalle de todos los cobros procesados</p>
        </div>
        <button class="btn-secondary" onclick="window.location.href='index.html'">Volver a Inicio</button>
    </header>

    <div class="panel-historial">
        <div class="resumen-corte">
            <div class="resumen-item">
                <div style="color: #666; font-weight: bold;">Total Ingresos</div>
                <div id="gran-total-corte" class="resumen-valor">$0.00</div>
            </div>
            <div class="resumen-item" style="border-left: 2px solid #ddd;">
                <div style="color: #666; font-weight: bold;">Cobros Realizados</div>
                <div id="total-operaciones" class="resumen-valor" style="color: #007bff;">0</div>
            </div>
        </div>

        <h2 style="margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px;">Detalle de Operaciones</h2>
        
        <div id="lista-historial" style="flex: 1; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px;">
        </div>
        

        <button id="btn-limpiar-historial" class="btn-peligro">Cerrar Caja / Limpiar Historial</button>
    </div>

    <script src="historial.js"></script>
</body>
</html>
