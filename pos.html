<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Punto de Venta - ZONAZERO</title>
    <link rel="stylesheet" href="pos-style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header class="app-header">
        <div>
            <h1 id="nombre-mesa-activa">Selecciona una Mesa</h1>
            <p id="desc-mesa-activa" class="subtitle">---</p>
        </div>
        <button id="btn-volver" class="btn-secondary" onclick="window.location.href='index.html'">Volver a Mesas</button>
    </header>

    <div class="pos-layout">
        <section class="panel-productos">
            <div class="categorias-scroll" id="categorias-container">
                <button class="btn-cat activo" onclick="filtrarCat('Todas')">Todas</button>
                <button class="btn-cat" onclick="filtrarCat('Cafetería')">Cafetería</button>
                <button class="btn-cat" onclick="filtrarCat('Snacks')">Snacks</button>
                <button class="btn-cat" onclick="filtrarCat('Bebidas')">Bebidas</button>
            </div>

            <div id="grid-productos" class="grid-productos">
                </div>
        </section>

        <section class="panel-ticket">
            <div class="ticket-header">
                <h2>Orden Actual</h2>
            </div>
            
            <div id="lista-orden" class="lista-orden">
                <div class="empty-state">No hay productos en esta cuenta aún.</div>
            </div>

            <div class="ticket-footer">
                <div class="totales">
                    <span>Total:</span>
                    <span id="gran-total" class="monto-total">$0.00</span>
                </div>
                <button id="btn-cobrar" class="btn-primary-red">Cobrar / Cerrar Mesa</button>
            </div>
        </section>
    </div>
<div id="modal-cobro" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 400px; padding: 20px; border-radius: 10px; max-height: 90vh; overflow-y: auto;">
            <span class="close-btn" onclick="document.getElementById('modal-cobro').style.display='none'" style="float: right; font-size: 28px; cursor: pointer;">&times;</span>
            
            <h2 style="margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px;">Cobrar: <span id="nombre-mesa-cobro" style="color: #28a745;"></span></h2>

            <div style="text-align: center; margin: 15px 0;">
                <h3 style="margin: 0; color: #666; font-size: 1.1em;">Gran Total de la Mesa:</h3>
                <div id="gran-total-mesa" style="font-size: 2.2em; font-weight: bold; color: #333;">$0.00</div>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding: 0 10px;">
                    <p style="color: #888; font-size: 0.9em; margin: 0;">Productos a cobrar:</p>
                    <label style="cursor: pointer; color: #007bff; font-weight: bold; font-size: 0.9em;">
                        <input type="checkbox" id="chk-seleccionar-todos" checked onchange="toggleSeleccionarTodos(this.checked)">
                        Marcar todos
                    </label>
                </div>
            </div>  

            <div id="lista-productos-dividir" style="max-height: 180px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 15px; border-radius: 8px; background: #fff;">
                </div>

            <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #eee;">
                <h3 style="margin: 0 0 10px 0; font-size: 1.1em; text-align: center;">Total a Cobrar Ahora:</h3>
                <div id="total-a-cobrar-ahora" style="color: #e63946; font-size: 2em; font-weight: bold; text-align: center; margin-bottom: 15px;">$0.00</div>

                <label style="display: block; font-weight: bold; color: #555;">¿Con cuánto pagan?</label>
                <div style="display: flex; align-items: center; gap: 10px; margin-top: 5px;">
                    <span style="font-size: 1.5em; color: #555;">$</span>
                    <input type="number" id="monto-pago" placeholder="0.00" style="font-size: 1.3em; padding: 8px; width: 100%; border: 1px solid #ccc; border-radius: 5px;">
                </div>

                <div id="mensaje-cambio" style="font-size: 1.4em; font-weight: bold; text-align: center; margin-top: 15px; min-height: 30px;">
                    </div>
            </div>

            <div style="margin-top: 15px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #eee;">
                <label style="display: block; font-weight: bold; color: #555; margin-bottom: 5px;">Enviar ticket por WhatsApp (Opcional):</label>
                <div style="display: flex; align-items: center; gap: 5px;">
                    <span style="background: #e9ecef; border: 1px solid #ccc; padding: 8px 12px; border-radius: 5px; font-weight: bold; color: #495057; display: flex; align-items: center;">📱 +52</span>
                    <input type="tel" id="telefono-whatsapp" placeholder="Ej. 951 123 4567" style="font-size: 1.2em; padding: 8px; width: 100%; border: 1px solid #ccc; border-radius: 5px;">
                </div>
            </div>

            <button id="btn-confirmar-cobro" class="btn-primary-green" style="width: 100%; margin-top: 20px; font-size: 1.2em; padding: 15px; border-radius: 8px;">Cobrar Seleccionados</button>
        </div>
    </div>
    
    <script src="pos.js"></script>
</body>
</html>
